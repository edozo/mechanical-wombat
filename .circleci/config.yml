version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: yarn

      - run:
          name: Lint
          command: yarn lint

      - run:
          name: Type check
          command: yarn typecheck

      - run:
          name: Build
          command: yarn build

  test-storybook:
    docker:
      - image: cimg/node:24.14-browsers
    resource_class: medium
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: yarn

      - run:
          name: Install Playwright Chromium
          command: npx playwright install --with-deps chromium

      - run:
          name: Run Storybook interaction tests
          command: |
            yarn build-storybook
            npx http-server storybook-static --port 9009 --silent &
            SB_SERVER_PID=$!
            trap "kill $SB_SERVER_PID" EXIT
            npx wait-on tcp:9009
            yarn test --maxWorkers=2

  publish:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: yarn

      - run:
          name: Build
          command: yarn build

      - run:
          name: Configure .npmrc
          command: |
            sed -i 's/GH_TOKEN/GH_PACKAGE_WRITE/g' .npmrc

      - run:
          name: Publish
          command: npm publish

  deploy-storybook:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout

      - run:
          name: Install dependencies
          command: yarn

      - run:
          name: Build Storybook
          command: yarn build-storybook

      - run:
          name: Deploy Storybook to GitHub Pages
          command: |
            git config --global user.email "ci@circleci.com"
            git config --global user.name "CircleCI"
            git remote set-url origin https://$GH_PACKAGE_WRITE@github.com/edozo/mechanical-wombat.git
            yarn gh-pages -d storybook-static -b gh-pages

  check-release-files:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout

      - run:
          name: Fetch main branch
          command: git fetch origin main

      - run:
          name: Check version bump and CHANGELOG update
          command: |
            CHANGED=$(git diff --name-only origin/main...HEAD)
            FAILED=""

            if ! echo "$CHANGED" | grep -qx "package.json"; then
              echo "ERROR: package.json has not been modified. Bump the version before merging."
              FAILED=1
            else
              echo "OK: package.json modified."
            fi

            if ! echo "$CHANGED" | grep -qx "CHANGELOG.md"; then
              echo "ERROR: CHANGELOG.md has not been modified. Add a changelog entry before merging."
              FAILED=1
            else
              echo "OK: CHANGELOG.md modified."
            fi

            if [ -n "$FAILED" ]; then
              exit 1
            fi

workflows:
  build_and_deploy:
    jobs:
      - check-release-files:
          filters:
            branches:
              ignore: main
      - build-and-test:
          context:
            - GithubPackages
      - test-storybook:
          context:
            - GithubPackages
      - publish:
          requires:
            - build-and-test
            - test-storybook
          filters:
            branches:
              only: main
          context:
            - GithubPackages
      - deploy-storybook:
          requires:
            - publish
          filters:
            branches:
              only: main
          context:
            - GithubPackages
